<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Acosta | Pixel 9 Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Bloqueo total para Pixel 9 */
        html, body { 
            margin: 0; padding: 0; overflow: hidden; 
            width: 100vw; height: 100vh; background: #000;
            position: fixed; top: 0; left: 0;
        }
        
        #app { position: relative; width: 100%; height: 100%; }
        
        video { width: 100%; height: 100%; object-fit: cover; }

        /* CALIBRACIÓN PIXEL 9: Anclaje inferior absoluto */
        #floor-layer { 
            position: absolute; 
            bottom: -10vh; /* Bajamos el origen para que salga desde el borde real */
            left: -100vw; 
            width: 300vw; 
            height: 120vh; /* Altura extra para cubrir el fondo */
            background-image: url('marmol.jpg');
            background-repeat: repeat;
            background-size: 380px; 
            /* Perspectiva ajustada para lentes gran angular de Pixel */
            transform: perspective(400px) rotateX(84deg);
            transform-origin: bottom center;
            pointer-events: none;
            opacity: 0.7;
            z-index: 5;
            /* Degradado Pro */
            -webkit-mask-image: linear-gradient(to top, 
                rgba(0,0,0,1) 0%, 
                rgba(0,0,0,1) 25%, 
                rgba(0,0,0,0) 80%);
            mask-image: linear-gradient(to top, 
                rgba(0,0,0,1) 0%, 
                rgba(0,0,0,1) 25%, 
                rgba(0,0,0,0) 80%);
            filter: contrast(1.1) brightness(1.1);
        }

        .ui-panel {
            position: absolute; bottom: 0; width: 100%;
            padding: 2rem 1.5rem;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
            z-index: 50;
        }
    </style>
</head>
<body>

    <div id="app">
        <video id="webcam" autoplay playsinline></video>
        <div id="floor-layer"></div>

        <div class="absolute top-12 w-full text-center z-50 pointer-events-none">
            <h1 class="text-white font-black tracking-[0.5em] text-2xl opacity-80">ACOSTA</h1>
            <p class="text-yellow-500 text-[10px] font-bold mt-2">PIXEL 9 OPTIMIZED</p>
        </div>

        <div class="ui-panel space-y-6">
            <div class="bg-black/60 backdrop-blur-xl p-5 rounded-[2.5rem] border border-white/10 shadow-2xl">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-white text-[10px] font-bold uppercase tracking-widest">Realismo</span>
                    <input type="range" min="0.1" max="0.95" step="0.05" value="0.7" 
                           class="w-2/3 h-1.5 bg-gray-700 rounded-lg appearance-none accent-yellow-500"
                           oninput="document.getElementById('floor-layer').style.opacity = this.value">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="zoomIn()" class="bg-white/5 text-white text-[10px] py-4 rounded-2xl border border-white/10 font-bold active:bg-white/20">ESCAMA</button>
                    <button onclick="rotate()" class="bg-white/5 text-white text-[10px] py-4 rounded-2xl border border-white/10 font-bold active:bg-white/20">ROTAR</button>
                </div>
            </div>
            
            <button id="lock-btn" onclick="lockUI()" class="w-full bg-white text-black font-black py-5 rounded-[2rem] text-[11px] uppercase tracking-[0.2em] shadow-white/10 shadow-2xl active:scale-95 transition-all">
                Fijar Vista Acosta
            </button>
        </div>
    </div>

    <script>
        const floor = document.getElementById('floor-layer');
        let currentZoom = 380;
        let currentRot = 0;

        // Cámara Trasera con alta resolución para Pixel 9
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { exact: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } } 
                });
                document.getElementById('webcam').srcObject = stream;
            } catch (e) {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('webcam').srcObject = stream;
            }
        }

        function zoomIn() {
            currentZoom = currentZoom >= 800 ? 200 : currentZoom + 150;
            floor.style.backgroundSize = `${currentZoom}px`;
        }
