<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Acosta</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: white; overflow: hidden; }
        #camera-container { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Esta es la capa que pone el piso */
        #overlay-floor { 
            position: absolute; 
            bottom: 0; left: 0; width: 100%; height: 60%; 
            background-image: url('marmol.jpg'); 
            background-repeat: repeat;
            background-size: 200px; /* Ajusta el tamaño del azulejo */
            opacity: 0.7; 
            /* Esto crea la perspectiva para que parezca suelo */
            transform: perspective(600px) rotateX(45deg);
            transform-origin: bottom;
            pointer-events: none;
            mask-image: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0));
        }

        .controls { 
            position: absolute; bottom: 20px; left: 0; width: 100%; 
            display: flex; justify-content: center; gap: 15px; z-index: 10;
        }
        .tile-option { 
            width: 70px; height: 70px; border: 3px solid #fff; border-radius: 10px; 
            object-fit: cover; cursor: pointer; background: #333;
        }
    </style>
</head>
<body>
    <div id="camera-container">
        <video id="webcam" autoplay playsinline></video>
        <div id="overlay-floor"></div>
    </div>

    <div class="controls">
        <img src="marmol.jpg" class="tile-option" onclick="changeTile('marmol.jpg')">
        <img src="beige.jpg" class="tile-option" onclick="changeTile('beige.jpg')">
    </div>

    <script>
        const video = document.getElementById('webcam');
        const overlay = document.getElementById('overlay-floor');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => console.error("Error cámara:", err));

        function changeTile(src) {
            overlay.style.backgroundImage = `url(${src})`;
        }
    </script>
</body>
</html>
