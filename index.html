<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visualizador Acosta | Calibrado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; position: fixed; width: 100%; height: 100%; }
        
        #app-viewport { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        
        video { width: 100%; height: 100%; object-fit: cover; }

        /* AJUSTE DE PRECISIÓN ACOSTA */
        #floor-layer { 
            position: absolute; 
            /* Bajamos el inicio del piso para que no flote */
            bottom: -5%; 
            left: -50%; 
            width: 200%; 
            height: 100%; 
            background-image: url('marmol.jpg');
            background-repeat: repeat;
            /* Tamaño inicial optimizado para tu imagen de mármol */
            background-size: 350px; 
            /* Perspectiva más baja para cubrir el suelo real */
            transform: perspective(600px) rotateX(80deg);
            transform-origin: bottom center;
            pointer-events: none;
            opacity: 0.65;
            z-index: 10;
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 100%);
        }

        .glass-panel {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 20;
        }
    </style>
</head>
<body>

    <div id="app-viewport">
        <video id="webcam" autoplay playsinline></video>
        
        <div id="floor-layer"></div>

        <div class="absolute top-10 w-full text-center z-30 pointer-events-none">
            <h1 class="text-white font-black text-2xl tracking-[0.4em] drop-shadow-2xl">ACOSTA</h1>
            <p class="text-yellow-500 text-[10px] font-bold tracking-[0.2em] mt-1">CALIBRACIÓN DE PISO</p>
        </div>

        <div class="absolute bottom-6 w-full px-4 z-40">
            <div class="glass-panel p-4 rounded-3xl">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-white text-[10px] font-bold uppercase">Realismo</span>
                    <input type="range" min="0.1" max="0.9" step="0.05" value="0.65" 
                           class="w-40 h-1.5 bg-gray-700 rounded-lg appearance-none accent-yellow-500"
                           oninput="document.getElementById('floor-layer').style.opacity = this.value">
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="rotateTile()" class="bg-white/10 text-white text-[10px] py-3 rounded-xl border border-white/10 uppercase font-bold">
                        🔄 Girar Veta
                    </button>
                    <button onclick="zoomTile()" class="bg-white/10 text-white text-[10px] py-3 rounded-xl border border-white/10 uppercase font-bold">
                        🔍 Tamaño
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const floor = document.getElementById('floor-layer');
        let rotation = 0;
        let zoom = 350;

        // Forzar cámara trasera
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: { exact: "environment" } } 
        }).then(s => document.getElementById('webcam').srcObject = s)
          .catch(e => navigator.mediaDevices.getUserMedia({ video: true })
          .then(s => document.getElementById('webcam').srcObject = s));

        function rotateTile() {
            rotation += 90;
            floor.style.transform = `perspective(600px) rotateX(80deg) rotateZ(${rotation}deg)`;
        }

        function zoomTile() {
            zoom = zoom >= 600 ? 250 : zoom + 150;
            floor.style.backgroundSize = `${zoom}px`;
        }
    </script>
</body>
</html>
