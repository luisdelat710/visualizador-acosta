<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acosta | AR Real</title>
    <!-- Motor de AR de Google -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        model-viewer {
            width: 100vw;
            height: 100vh;
            background-color: #000;
        }
        /* Botón Estilo Acosta */
        #ar-button {
            background: white;
            color: black;
            border-radius: 2rem;
            padding: 18px 36px;
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 900;
            font-size: 12px;
            letter-spacing: 0.2em;
            border: none;
            box-shadow: 0 10px 40px rgba(255,255,255,0.15);
            z-index: 100;
        }
        .header {
            position: absolute;
            top: 50px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="text-white font-black tracking-[0.6em] text-2xl opacity-90">ACOSTA</h1>
        <p class="text-yellow-500 text-[10px] font-bold mt-2 uppercase">Visualizador de Planos Real</p>
    </div>

    <!-- 
        CONFIGURACIÓN PARA TU ARCHIVO:
        src: Apunta exactamente a tu archivo marmol-compressed.glb
        ar-placement: "floor" obliga a que busque el piso.
    -->
    <model-viewer 
        src="marmol-compressed.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        ar-placement="floor"
        camera-controls 
        touch-action="pan-y"
        shadow-intensity="2"
        exposure="1.2"
        alt="Mármol Acosta en AR">
        
        <button slot="ar-button" id="ar-button">
            PROYECTAR MÁRMOL EN PISO
        </button>

        <div id="ar-prompt" class="absolute bottom-32 left-1/2 -translate-x-1/2 text-white/50 text-[9px] uppercase tracking-widest">
            Mueve el celular para detectar el suelo
        </div>
    </model-viewer>

    <script>
        const modelViewer = document.querySelector("model-viewer");
        
        // Log para depuración en consola del Pixel 9
        modelViewer.addEventListener('error', (event) => {
            console.error("Error cargando el modelo Acosta:", event.detail);
        });
    </script>
</body>
</html>
