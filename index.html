<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pisos y Azulejos Acosta - Visualizador</title>
    <style>
        body { margin: 0; font-family: Arial; background: #1a1a1a; color: white; text-align: center; }
        #camera-container { position: relative; width: 100%; height: 70vh; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #overlay-floor { 
            position: absolute; top: 50%; left: 0; width: 100%; height: 50%; 
            background-image: url('tu-piso-aqui.jpg'); /* Aquí irá tu azulejo */
            background-size: 150px; opacity: 0.6; transform: perspective(500px) rotateX(60deg);
            pointer-events: none;
        }
        .controls { padding: 20px; display: flex; overflow-x: auto; gap: 10px; }
        .tile-option { width: 80px; height: 80px; border: 2px solid white; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Visualizador Acosta</h2>
    <div id="camera-container">
        <video id="webcam" autoplay playsinline></video>
        <div id="overlay-floor"></div>
    </div>
    <div class="controls">
        <img src="modelo1.jpg" class="tile-option" onclick="changeTile('modelo1.jpg')">
        <img src="modelo2.jpg" class="tile-option" onclick="changeTile('modelo2.jpg')">
    </div>

    <script>
        const video = document.getElementById('webcam');
        const overlay = document.getElementById('overlay-floor');

        // Activar Cámara
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; });

        function changeTile(src) {
            overlay.style.backgroundImage = `url(${src})`;
        }
    </script>
</body>
</html>
